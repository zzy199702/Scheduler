<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5B8AF5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="排课工具">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>排课预约工具</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="hdr">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <path d="M16 2v4M8 2v4M3 10h18"/>
    </svg>
    排课预约工具
  </div>
  <button class="gear-btn" onclick="openSettings()" aria-label="全局设置" title="全局设置">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/>
      <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.1 2.1 0 0 1-2.98 2.98l-.04-.04A1.8 1.8 0 0 0 14.8 19.6a1.8 1.8 0 0 0-1.08 1.64V21a2.1 2.1 0 0 1-4.2 0v-.06A1.8 1.8 0 0 0 8.4 19.3a1.8 1.8 0 0 0-1.98.36l-.04.04a2.1 2.1 0 0 1-2.98-2.98l.04-.04A1.8 1.8 0 0 0 3.8 14.7 1.8 1.8 0 0 0 2.16 13H2a2.1 2.1 0 0 1 0-4.2h.06A1.8 1.8 0 0 0 3.7 7.6a1.8 1.8 0 0 0-.36-1.98l-.04-.04A2.1 2.1 0 0 1 6.28 2.6l.04.04A1.8 1.8 0 0 0 8.3 3a1.8 1.8 0 0 0 1.08-1.64V1.3a2.1 2.1 0 0 1 4.2 0v.06A1.8 1.8 0 0 0 14.7 3a1.8 1.8 0 0 0 1.98-.36l.04-.04A2.1 2.1 0 0 1 19.7 5.58l-.04.04A1.8 1.8 0 0 0 19.3 7.6a1.8 1.8 0 0 0 1.64 1.08H21a2.1 2.1 0 0 1 0 4.2h-.06A1.8 1.8 0 0 0 19.4 15Z"/>
    </svg>
  </button>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-scroll" id="sbScroll">

      <!-- Per-day settings -->
      <div class="sec-label" id="cfgLabel">全局默认设置</div>
      <div class="cfg-panel">
        <div class="row2" style="margin-bottom:10px">
          <div class="fg" style="margin-bottom:0">
            <label>开始时间</label>
            <input type="time" id="cfgStart" oninput="saveCfg()">
          </div>
          <div class="fg" style="margin-bottom:0">
            <label>结束时间</label>
            <input type="time" id="cfgEnd" oninput="saveCfg()">
          </div>
        </div>
        <div class="fg" style="margin-bottom:0">
          <label>课间休息（分钟）</label>
          <input type="number" id="cfgBrk" min="0" max="120" style="max-width:100px" oninput="saveCfg()">
        </div>

        <div class="breaks-block">
          <div class="bh">
            <span>休息 / 用餐时间</span>
            <span class="break-add" onclick="addDayBreak()">+ 添加</span>
          </div>
          <div id="cfgBreaks"></div>
        </div>

        <div class="cfg-hint" id="cfgHint"></div>

        <div class="rearrange-row">
          <button class="btn btn-outline rearrange-btn" onclick="onRearrangeClick()">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:2px">
              <polyline points="23 4 23 10 17 10"/>
              <polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            重新排课
          </button>
          <button class="mini-gear" onclick="openStrategySettings()" title="排课策略" aria-label="排课策略">⚙</button>
        </div>
        <button class="btn btn-outline btn-full undo-btn" id="undoBtn" onclick="undoLastChange()" disabled>撤销上一步</button>
      </div>

      <div class="divider"></div>

      <!-- Form -->
      <div class="sec-label" id="formLabel">新建预约</div>

      <!-- Edit mode banner -->
      <div class="edit-banner" id="editBanner">
        <span>正在编辑：<strong id="editBannerName"></strong></span>
        <button class="btn btn-outline btn-sm" onclick="cancelEdit()">取消编辑</button>
      </div>

      <div class="fg">
        <label>学生姓名</label>
        <input type="text" id="iName" placeholder="输入学生姓名" maxlength="12" oninput="renderEditPrecheck()">
      </div>
      <div class="fg">
        <label>日期</label>
        <input type="date" id="iDate" oninput="renderEditPrecheck()">
      </div>
      <div class="fg">
        <label>期望时间段（最早开始 / 最晚结束）</label>
        <div class="row2">
            <input type="time" id="iWinStart" oninput="renderEditPrecheck()">
            <input type="time" id="iWinEnd" oninput="renderEditPrecheck()">
        </div>
      </div>
      <div class="fg">
        <label>课时数（每课时50分钟）</label>
        <input type="number" id="iPeriods" value="2" min="1" max="10" oninput="renderEditPrecheck()">
      </div>
      <div class="fg" id="breakMinField" style="display:none">
        <label>本节课间休息（分钟）</label>
        <input type="number" id="iBreakMin" min="0" max="120" oninput="renderEditPrecheck()">
      </div>
      <!-- Edit-only: actual start time override -->
      <div class="fg" id="startTimeField" style="display:none">
        <label>实际开始时间</label>
        <div class="start-lock-row">
          <input type="time" id="iStartTime" oninput="renderEditPrecheck()">
          <label class="lock-check">
            <input type="checkbox" id="iLockedStart">
            <span>锁定时间</span>
          </label>
        </div>
      </div>
      <div class="precheck" id="editPrecheck" style="display:none"></div>

      <div class="err" id="addErr"></div>

      <!-- Add mode buttons -->
      <div id="addBtns">
        <button class="btn btn-primary btn-full" onclick="submitForm()">+ 预约</button>
      </div>
      <!-- Edit mode buttons -->
      <div id="editBtns" style="display:none">
        <div class="row2">
          <button class="btn btn-outline btn-full" onclick="cancelEdit()">取消</button>
          <button class="btn btn-primary btn-full" onclick="submitForm()">保存修改</button>
        </div>
      </div>

      <div class="divider"></div>
      <div class="sec-label" id="blLabel">预约记录</div>
      <div id="bookingList"><div class="empty-note">请先在日历上选择日期</div></div>
    </div>
  </div>

  <div class="right">
    <div class="cal-wrap">
      <div class="cal-hdr">
        <div class="cal-title" id="calTitle"></div>
        <div class="cal-ctrl">
          <button class="nav-btn" onclick="navM(-1)">‹</button>
          <button class="btn btn-outline btn-sm" onclick="navToday()">今天</button>
          <button class="nav-btn" onclick="navM(1)">›</button>
        </div>
      </div>
      <div class="cal-grid">
        <div class="cal-wk">
          <div class="wk-name wknd">日</div>
          <div class="wk-name">一</div><div class="wk-name">二</div>
          <div class="wk-name">三</div><div class="wk-name">四</div>
          <div class="wk-name">五</div>
          <div class="wk-name wknd">六</div>
        </div>
        <div class="cal-days" id="calDays"></div>
      </div>
    </div>

    <div class="detail-resizer" id="detailResizer" title="拖动调整下方面板高度"></div>
    <div class="day-detail" id="dayDetail">
      <div class="dt-inner">
        <div class="dt-hdr">
          <div class="dt-title" id="dtTitle"></div>
          <div class="dt-tag" id="dtTag"></div>
          <button class="close-btn" onclick="closeDetail()">×</button>
        </div>
        <div class="p-rows" id="pRows"></div>
      </div>
    </div>
  </div>
</div>

<!-- Global settings modal -->
<div class="overlay" id="settingsModal">
  <div class="settings-modal">
    <div class="settings-hdr">
      <h3>全局默认设置</h3>
      <button class="close-btn" onclick="closeSettings()">×</button>
    </div>
    <div class="settings-body">
      <div class="row2" style="margin-bottom:10px">
        <div class="fg" style="margin-bottom:0">
          <label>开始时间</label>
          <input type="time" id="setStart" oninput="renderSettingsHint()">
        </div>
        <div class="fg" style="margin-bottom:0">
          <label>结束时间</label>
          <input type="time" id="setEnd" oninput="renderSettingsHint()">
        </div>
      </div>
      <div class="fg" style="margin-bottom:0">
        <label>课间休息（分钟）</label>
        <input type="number" id="setBrk" min="0" max="120" style="max-width:120px" oninput="renderSettingsHint()">
      </div>

      <div class="breaks-block">
        <div class="bh">
          <span>休息 / 用餐时间</span>
          <span class="break-add" onclick="addGlobalBreak()">+ 添加</span>
        </div>
        <div id="setBreaks"></div>
      </div>

      <div class="cfg-hint" id="setHint"></div>
      <div style="font-size:11px;color:var(--muted);margin-top:10px;line-height:1.6">
        保存后将作为新日期的默认配置；已单独设置过的日期不会被覆盖。<br>
        每日开始到结束时间以外的时段，默认视为休息/用餐时间。
      </div>
    </div>
    <div class="settings-foot">
      <button class="btn btn-outline" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveGlobalSettings()">保存为全局设置</button>
    </div>
  </div>
</div>

<!-- Scheduling strategy modal -->
<div class="overlay" id="strategyModal">
  <div class="confirm-modal">
    <div class="confirm-hdr">
      <h3>排课策略</h3>
    </div>
    <div class="confirm-body">
      <label class="strategy-choice">
        <input type="radio" name="scheduleStrategy" value="student">
        <span><b>学生期望优先</b><br>尽量少超出学生给的期望时间。</span>
      </label>
      <label class="strategy-choice">
        <input type="radio" name="scheduleStrategy" value="teacher">
        <span><b>老师时间优先</b><br>尽量少提前上班、少延后下班、少占休息。</span>
      </label>
      <label class="strategy-choice">
        <input type="radio" name="scheduleStrategy" value="compact">
        <span><b>紧凑优先</b><br>尽量让课程连续，减少空档和整体拖长。</span>
      </label>
    </div>
    <div class="confirm-foot">
      <button class="btn btn-outline" onclick="closeStrategySettings()">取消</button>
      <button class="btn btn-primary" onclick="saveStrategySettings()">保存</button>
    </div>
  </div>
</div>

<!-- Confirm modal (out-of-hours bookings, etc.) -->
<div class="overlay" id="confirmModal">
  <div class="confirm-modal">
    <div class="confirm-hdr">
      <h3 id="confirmTitle">确认</h3>
    </div>
    <div class="confirm-body" id="confirmBody"></div>
    <div class="confirm-foot">
      <button class="btn btn-outline" onclick="confirmCancel()">取消</button>
      <button class="btn btn-primary" id="confirmOk" onclick="confirmOk()">继续添加</button>
    </div>
  </div>
</div>

<!-- Conflict / scheduling modal -->
<div class="overlay" id="conflictModal">
  <div class="cm">
    <div class="cm-hdr">
      <div class="cm-hdr-icon">!</div>
      <div class="cm-hdr-text">
        <h3 id="cmTitle">预约时间冲突</h3>
        <p id="cmSubtitle">请选择解决方案</p>
      </div>
    </div>
    <div class="cm-body">
      <div class="cm-section">
        <div class="cm-slabel" id="cmNewLabel">新预约</div>
        <div id="cmNew"></div>
      </div>
      <div class="cm-section" id="cmConflictsSection">
        <div class="cm-slabel">冲突的已有预约</div>
        <div id="cmConflicts"></div>
      </div>
      <div class="cm-sep">解决方案</div>
      <div id="cmSuggs"></div>
    </div>
    <div class="cm-foot">
      <button class="btn btn-outline" onclick="cancelPending()">取消</button>
    </div>
  </div>
</div>

<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/settings.js"></script>
<script src="js/scheduler.js"></script>
<script src="js/calendar.js"></script>
<script src="js/main.js"></script>
</body>
</html>
